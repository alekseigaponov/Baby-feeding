<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <defs>
    <radialGradient id="moonGrad" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffd6a5"/>
      <stop offset="100%" stop-color="#f4a56a"/>
    </radialGradient>
    <radialGradient id="dropGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffe8d6"/>
      <stop offset="100%" stop-color="#f9c49a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="52" fill="#fff8f2" opacity="0.95"/>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#f4a56a" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="30s" repeatCount="indefinite"/>
  </circle>

  <!-- Moon body (crescent) -->
  <g filter="url(#glow)">
    <circle cx="58" cy="58" r="26" fill="url(#moonGrad)">
      <animate attributeName="r" values="26;27;26" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </circle>
    <!-- Cutout to make crescent -->
    <circle cx="68" cy="50" r="18" fill="#fff8f2"/>
  </g>

  <!-- Milk drop inside crescent -->
  <g filter="url(#softGlow)">
    <!-- Drop body -->
    <ellipse cx="54" cy="66" rx="7" ry="9" fill="url(#dropGrad)">
      <animate attributeName="ry" values="9;10;9" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </ellipse>
    <!-- Drop tip (top rounded) -->
    <ellipse cx="54" cy="57" rx="5" ry="4.5" fill="url(#dropGrad)">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </ellipse>
    <!-- Shine on drop -->
    <ellipse cx="51" cy="60" rx="1.8" ry="2.5" fill="white" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </ellipse>
  </g>

  <!-- Stars scattered around -->
  <!-- Star 1 -->
  <g>
    <circle cx="28" cy="32" r="2.5" fill="#f4a56a">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;3.2;2.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Star 2 -->
  <g>
    <circle cx="92" cy="42" r="1.8" fill="#ffd6a5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;2.5;1.8" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Star 3 -->
  <g>
    <circle cx="86" cy="82" r="2" fill="#f4a56a">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;2.8;2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Star 4 (tiny) -->
  <g>
    <circle cx="36" cy="86" r="1.3" fill="#ffd6a5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Star 5 (tiny) -->
  <g>
    <circle cx="75" cy="25" r="1" fill="#f4a56a">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 4-point star decoration -->
  <g transform="translate(88,30)" opacity="0.8">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5 Z" fill="#f4a56a">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;20;0" dur="5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
    </path>
  </g>

  <!-- Text: Амина -->
  <text x="60" y="103" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2"
    fill="#2a1f14"
    opacity="0.85">АМИНА</text>
</svg>
